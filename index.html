<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Thalappanth - Opening</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: sans-serif;
        }
        @media screen and (orientation: portrait) {
            #rotate-msg { display: flex; }
            #opening-content { display: none; }
        }
        @media screen and (orientation: landscape) {
            #rotate-msg { display: none; }
            #opening-content { display: flex; }
        }
        #rotate-msg {
            position: fixed; width: 100%; height: 100%;
            background: #111; color: #fff;
            flex-direction: column; justify-content: center; align-items: center;
        }
        #opening-content {
            width: 100%; height: 100%;
            justify-content: center; align-items: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        .logo-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .fade-in { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="rotate-msg">
        <div style="font-size: 50px; margin-bottom: 10px;">🔄</div>
        <p>Please rotate to Landscape</p>
    </div>

    <div id="opening-content">
        <img src="game/assets/tap.png.png" alt="Logo" class="logo-img">
    </div>

    <script>
        // Register Service Worker for PWA installation
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Failed', err));
            });
        }

        window.onload = function() {
            const content = document.getElementById('opening-content');
            setTimeout(() => { content.classList.add('fade-in'); }, 500);

            // Redirect to loading page after 4.5 seconds
            setTimeout(() => {
                window.location.href = "game/loading.html";
            }, 4500);
        };
    </script>
</body>
</html>
