<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thalappanth - Opening</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Landscape orientation logic */
        @media screen and (orientation: portrait) {
            #rotate-message { display: flex; }
            #content { display: none; }
        }

        @media screen and (orientation: landscape) {
            #rotate-message { display: none; }
            #content { display: flex; }
        }

        #rotate-message {
            position: fixed;
            width: 100%; height: 100%;
            background: #111; color: white;
            flex-direction: column; justify-content: center; align-items: center;
            font-family: sans-serif;
        }

        #content {
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .logo-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .fade-in { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="rotate-message">
        <div style="font-size: 40px;">🔄</div>
        <p>Rotate to Landscape</p>
    </div>

    <div id="content">
        <img src="game/assets/tap.png.png" alt="Thalappanth" class="logo-img">
    </div>

    <script>
        window.onload = function() {
            const content = document.getElementById('content');
            
            // Fade in the image
            setTimeout(() => {
                content.classList.add('fade-in');
            }, 500);

            // Move to Loading Page after 4 seconds
            setTimeout(() => {
                window.location.href = "game/loading.html";
            }, 4000);
        };
    </script>
</body>
</html>
