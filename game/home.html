<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thalappanth Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100vh;
            margin: 0; padding: 0;
            background: #000 url('assets/home-bg.jpg') no-repeat center center;
            background-size: 100% 100%;
            background-attachment: fixed;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
            user-select: none;
        }

        /* Top Navigation Bar */
        .top-nav {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px;
        }

        .stats-group { display: flex; gap: 10px; }
        
        .stat-box {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444; border-radius: 20px;
            padding: 5px 15px; display: flex; align-items: center; gap: 10px;
            font-size: 14px; font-weight: bold;
        }

        .level-circle {
            background: #6c5ce7; width: 35px; height: 35px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; border: 2px solid white; font-weight: bold;
        }

        /* Center Player Section */
        .main-avatar {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .avatar-glow {
            width: 130px; height: 130px;
            border-radius: 50%; border: 4px solid #f1c40f;
            background: rgba(0, 0, 0, 0.4);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.4);
        }

        /* Bottom Menu Buttons */
        .bottom-nav {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 15px;
        }
        .nav-btn {
            background: #2d3436; color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: bold;
            font-size: 14px; cursor: pointer;
        }
        .play-btn {
            background: #00b894; padding: 15px 70px; border-radius: 15px;
            font-size: 28px; font-weight: 900; color: white;
            box-shadow: 0 6px 0 #00947a;
            cursor: pointer;
        }
        .play-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #00947a; }

        .settings-icon { font-size: 30px; cursor: pointer; color: #b2bec3; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="stats-group">
            <div class="stat-box">💰 1,000</div>
            <div class="stat-box">💎 35</div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="level-circle">7</div>
            <div class="settings-icon" onclick="openSettings()">⚙️</div>
        </div>
    </div>

    <div class="main-avatar">
        <div class="avatar-glow">
            <span style="font-size: 80px;">👤</span>
        </div>
        <div style="background: #d63031; padding: 4px 15px; border-radius: 5px; margin-top: 10px;">PLAYER</div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn">STORE</button>
        <button class="play-btn" onclick="startMatch()">PLAY</button>
        <button class="nav-btn">RANK</button>
        <button class="nav-btn">MODE</button>
    </div>

    <script>
        function startMatch() {
            // Multiplayer connection logic will be added here later
            alert("Connecting to Multiplayer Server...");
        }
        function openSettings() {
            // Redirects to settings.html
            window.location.href = "settings.html";
        }
    </script>
</body>
</html>
