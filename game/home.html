<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thalappanth - Home Screen</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            background: url('assets/castle.png') no-repeat center center;
            background-size: cover;
            font-family: 'Arial', sans-serif; color: white;
        }

        /* Top Bar */
        .top-bar {
            position: absolute; top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; box-sizing: border-box;
            background: rgba(0,0,0,0.5);
        }

        .stats-container { display: flex; gap: 10px; }

        .stat-box {
            background: rgba(0,0,0,0.7); border: 2px solid #444;
            border-radius: 10px; display: flex; align-items: center;
            padding: 5px 12px; min-width: 105px; font-weight: bold;
        }

        .add-btn {
            background: #2ecc71; border: none; color: white;
            margin-left: auto; border-radius: 4px; padding: 2px 8px;
            cursor: pointer;
        }

        .level-container {
            display: flex; align-items: center; background: rgba(0,0,0,0.6);
            padding: 5px 15px; border-radius: 25px; gap: 10px;
        }

        .lvl-badge {
            background: #8e44ad; width: 35px; height: 35px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-weight: bold; border: 2px solid #fff;
        }

        .lvl-bar {
            width: 100px; height: 12px; background: #2c3e50;
            border-radius: 10px; overflow: hidden;
        }

        .lvl-fill { width: 45%; height: 100%; background: #f1c40f; }

        /* Character & Editable Name Area */
        .main-display {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .character-img {
            width: 180px; height: 180px;
            border: 6px solid #f1c40f; border-radius: 50%;
            background: rgba(255,255,255,0.1);
            object-fit: cover; box-shadow: 0 0 30px rgba(241, 196, 15, 0.4);
        }

        .name-container {
            margin-top: 15px; display: flex; align-items: center;
            background: #c0392b; padding: 8px 20px; border-radius: 8px;
            box-shadow: 0 4px 0 #962d22; gap: 10px;
        }

        #player-name {
            background: none; border: none; color: white;
            font-weight: bold; font-size: 18px; text-transform: uppercase;
            text-align: center; width: auto; max-width: 150px;
            outline: none;
        }

        .edit-icon { cursor: pointer; font-size: 16px; opacity: 0.8; }
        .edit-icon:hover { opacity: 1; }

        /* Bottom Menu */
        .bottom-bar {
            position: absolute; bottom: 0; width: 100%;
            display: flex; justify-content: space-around; align-items: center;
            padding: 20px; box-sizing: border-box;
            background: rgba(0,0,0,0.5);
        }

        .play-btn {
            background: #27ae60; color: white; border: none;
            padding: 12px 70px; border-radius: 40px; font-size: 30px;
            font-weight: 900; cursor: pointer;
            box-shadow: 0 6px 0 #1e8449; transition: 0.1s;
        }

        .play-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1e8449; }

        .side-btn {
            background: #34495e; border: none; border-radius: 12px;
            padding: 12px 25px; font-weight: bold; color: white;
            box-shadow: 0 4px 0 #2c3e50; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="stats-container">
            <div class="stat-box">💰 20,380 <button class="add-btn">+</button></div>
            <div class="stat-box">💎 35 <button class="add-btn">+</button></div>
        </div>
        <div class="level-container">
            <div class="lvl-badge">7</div>
            <div class="lvl-bar"><div class="lvl-fill"></div></div>
        </div>
        <div style="cursor: pointer; font-size: 24px;">⚙️</div>
    </div>

    <div class="main-display">
        <img src="assets/player.png" alt="Player" class="character-img">
        
        <div class="name-container">
            <input type="text" id="player-name" value="LOADING..." maxlength="12">
            <span class="edit-icon" onclick="document.getElementById('player-name').focus()">✏️</span>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="side-btn">Shop</button>
        <button class="play-btn" onclick="location.href='game.html'">Play</button>
        <button class="side-btn">Rank</button>
    </div>

    <script>
        // Random Name Generator
        const randomNames = ["StrikerX", "GoaliePro", "Thala_07", "KingFoot", "ShadowBox", "TurboKick"];
        
        window.onload = () => {
            const nameField = document.getElementById('player-name');
            const random = randomNames[Math.floor(Math.random() * randomNames.length)];
            nameField.value = random;
        };
    </script>

</body>
</html>
