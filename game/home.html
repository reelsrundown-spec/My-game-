<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thalappanth - Home</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial Black', sans-serif;
        }

        /* Full Screen Background */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: url('home-bg.jpg') no-repeat center center;
            background-size: 100% 100%;
            z-index: -1;
        }

        .ui-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }

        /* Top Bar */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 10px;
        }
        .stat-group { display: flex; gap: 10px; }
        .stat-item {
            background: rgba(0,0,0,0.8); border: 1.5px solid #444;
            border-radius: 20px; padding: 5px 15px; color: white;
            font-size: 14px; display: flex; align-items: center; gap: 5px;
        }
        .lvl-badge {
            background: #6c5ce7; width: 35px; height: 35px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; border: 2px solid white; color: white; font-weight: bold;
        }

        /* Center Character */
        .center-area {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            margin-top: -20px;
        }
        .avatar-circle {
            width: 140px; height: 140px; border-radius: 50%;
            border: 4px solid #f1c40f; background: rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.5);
        }
        .avatar-circle img { width: 70%; height: auto; }
        
        .name-tag {
            margin-top: 10px; background: #d63031; color: white;
            padding: 5px 30px; border-radius: 5px; font-size: 14px;
            text-transform: uppercase; font-weight: bold;
        }

        /* Bottom Nav */
        .bottom-nav {
            display: flex; justify-content: center; align-items: center;
            gap: 15px; padding-bottom: 20px;
        }
        .play-btn {
            background: #00b894; color: white; border: 2px solid #55efc4;
            padding: 12px 60px; border-radius: 15px; font-size: 28px;
            font-weight: 900; cursor: pointer; text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            box-shadow: 0 6px 0 #008168; transition: 0.1s;
        }
        .play-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #008168; }
        
        .nav-btn {
            background: #2d3436; border: none; padding: 10px 15px;
            border-radius: 8px; color: white; font-weight: bold;
            font-size: 12px; min-width: 70px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="ui-container">
        <div class="top-bar">
            <div class="stat-group">
                <div class="stat-item">💰 1,000</div>
                <div class="stat-item">💎 35</div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="lvl-badge">7</div>
                <div onclick="location.href='settings.html'" style="font-size: 26px; cursor: pointer; color: #dfe6e9;">⚙️</div>
            </div>
        </div>

        <div class="center-area">
            <div class="avatar-circle">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzA5OGTRZSI+PHBhdGggZD0iTTEyIDJDNi40OCAyIDIgNi40OCAyIDFzNC40OCAxMCAxMCAxMCAxMC00LjQ4IDEwLTEwUzE3LjUyIDIgMTIgMnptMCAzYzMuMzEgMCA2IDIuNjkgNiA2cy0yLjY5IDYtNiA2LTYtMi42OS02LTYgMi42OS02IDYtNnptMCAxNC42Yy0yLjk3IDAtNS42MS0xLjMzLTcuMzQtMy40LjA0LTIuNDkgNC44NC0zLjcgNy4zNC0zLjdzNy4zIDEuMjYgNy4zNCAzLjdjLTEuNzMgMi4wNy00LjM3IDMuNC03LjM0IDMuNHoiLz48L3N2Zz4=">
            </div>
            <div class="name-tag">PLAYER</div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn">STORE</button>
            <button class="play-btn" onclick="location.href='game.html'">PLAY</button>
            <button class="nav-btn">RANK</button>
            <button class="nav-btn">MODE</button>
        </div>
    </div>

    <script>
        // Fullscreen script - Call this to hide browser UI
        function goFullScreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        }

        // Trigger fullscreen on first click anywhere
        document.addEventListener('click', goFullScreen, { once: true });
    </script>
</body>
</html>
