<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; font-family: Arial, sans-serif; color: white;
            overflow: hidden;
        }
        .bar-container { width: 60%; background: #222; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 20px; border: 1px solid #333; }
        .bar-fill { width: 0%; height: 100%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; transition: width 0.1s linear; }
        .status { font-size: 14px; letter-spacing: 2px; color: #00ffcc; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <div class="status" id="load-text">Initializing Multiplayer...</div>
    <div class="bar-container">
        <div class="bar-fill" id="fill"></div>
    </div>
    <div id="percent" style="margin-top: 10px; font-size: 16px; color: #888;">0%</div>

    <script>
        let progress = 0;
        const fill = document.getElementById('fill');
        const percent = document.getElementById('percent');
        const status = document.getElementById('load-text');

        const tasks = ["Connecting to Server", "Loading Game Assets", "Syncing Player Data", "Finalizing..."];

        const interval = setInterval(() => {
            progress++;
            fill.style.width = progress + "%";
            percent.innerText = progress + "%";

            if(progress < 25) status.innerText = tasks[0];
            else if(progress < 55) status.innerText = tasks[1];
            else if(progress < 85) status.innerText = tasks[2];
            else status.innerText = tasks[3];

            if(progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    // Redirect to Home Page (home.html inside game folder)
                    window.location.href = "home.html";
                }, 800);
            }
        }, 50); 
    </script>
</body>
</html>
